[workspace]
resolver = "2"
members = [
    "crates/nex-types",
    "crates/nex-state",
    "crates/nex-mempool",
    "crates/nex-consensus",
    "crates/nex-sim",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
blake3 = "1.5"
nex-types = { path = "crates/nex-types" }
nex-state = { path = "crates/nex-state" }
nex-mempool = { path = "crates/nex-mempool" }
nex-consensus = { path = "crates/nex-consensus" }
